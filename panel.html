<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MC Panel Pro</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: {
                        dark: { 900: '#0f0f11', 800: '#18181b', 700: '#27272a', 600: '#3f3f46' },
                        brand: { 500: '#3b82f6', 600: '#2563eb', 400: '#60a5fa' }
                    },
                    animation: { 'gradient': 'gradient 8s linear infinite' },
                    keyframes: { gradient: { '0%, 100%': { backgroundPosition: '0% 50%' }, '50%': { backgroundPosition: '100% 50%' } } }
                }
            }
        }
    </script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Ace Editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #0f0f11; color: #e4e4e7; }
        .glass { background: rgba(24, 24, 27, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .gradient-bg { background: linear-gradient(-45deg, #0f0f11, #18181b, #27272a, #0f0f11); background-size: 400% 400%; animation: gradient 15s ease infinite; }
        .scrollbar::-webkit-scrollbar { width: 6px; }
        .scrollbar::-webkit-scrollbar-track { background: transparent; }
        .scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
        .ace_editor { font-family: 'JetBrains Mono', monospace !important; font-size: 13px !important; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="gradient-bg h-screen overflow-hidden flex flex-col" x-data="app()" x-init="initApp()">

    <!-- Login Overlay -->
    <div x-show="!auth" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md" x-cloak>
        <div class="glass p-8 rounded-2xl w-full max-w-md shadow-2xl transform transition-all">
            <div class="flex justify-center mb-6 text-brand-500"><i data-lucide="shield-check" class="w-16 h-16"></i></div>
            <h2 class="text-2xl font-bold text-center mb-2">Panel Access</h2>
            <p class="text-zinc-400 text-center mb-6 text-sm">Enter credentials to manage server</p>
            <input type="password" x-model="password" @keydown.enter="login()" class="w-full bg-dark-900 border border-dark-600 rounded-lg px-4 py-3 mb-4 focus:outline-none focus:border-brand-500 transition" placeholder="Password">
            <button @click="login()" class="w-full bg-brand-600 hover:bg-brand-500 text-white font-medium py-3 rounded-lg transition shadow-lg shadow-brand-500/20">Sign In</button>
            <p x-show="error" class="text-red-400 text-center mt-4 text-sm" x-cloak x-text="error"></p>
        </div>
    </div>

    <!-- Main App -->
    <div x-show="auth" class="flex-1 flex flex-col h-full" x-cloak>
        <!-- Top Bar -->
        <header class="h-14 glass border-b border-white/5 flex items-center justify-between px-4 shrink-0 z-20">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 rounded-full" :class="wsOpen ? 'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]' : 'bg-red-500'"></div>
                <span class="font-semibold text-sm tracking-wide">MC PANEL PRO</span>
            </div>
            <div class="flex items-center gap-4 text-xs font-mono text-zinc-400">
                <div class="hidden md:flex items-center gap-2"><i data-lucide="users" class="w-3 h-3"></i> <span x-text="status.players"></span></div>
                <div class="hidden md:flex items-center gap-2"><i data-lucide="server" class="w-3 h-3"></i> <span x-text="status.version"></span></div>
                <div class="flex items-center gap-2"><i data-lucide="globe" class="w-3 h-3"></i> <span x-text="status.ip"></span></div>
            </div>
            <button @click="logout()" class="text-zinc-400 hover:text-white"><i data-lucide="log-out" class="w-4 h-4"></i></button>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <!-- Sidebar -->
            <aside class="w-16 md:w-64 glass border-r border-white/5 flex flex-col shrink-0 transition-all duration-300">
                <nav class="flex-1 py-4 space-y-1">
                    <template x-for="item in navItems">
                        <button @click="tab = item.id" class="w-full flex items-center gap-3 px-4 py-3 text-sm font-medium transition-colors"
                            :class="tab === item.id ? 'bg-brand-500/10 text-brand-400 border-r-2 border-brand-500' : 'text-zinc-400 hover:text-white hover:bg-white/5'">
                            <i :data-lucide="item.icon" class="w-5 h-5 shrink-0"></i>
                            <span class="hidden md:block" x-text="item.label"></span>
                        </button>
                    </template>
                </nav>
                <div class="p-4 border-t border-white/5">
                    <button @click="tab = 'settings'" class="w-full flex items-center gap-3 px-4 py-2 text-xs text-zinc-500 hover:text-white transition">
                        <i data-lucide="settings" class="w-4 h-4"></i> <span class="hidden md:block">Settings</span>
                    </button>
                </div>
            </aside>

            <!-- Content -->
            <main class="flex-1 overflow-hidden relative bg-dark-900/50">
                
                <!-- Console Tab -->
                <div x-show="tab === 'console'" class="absolute inset-0 flex flex-col" x-cloak>
                    <div class="flex-1 overflow-y-auto scrollbar p-4 space-y-1 font-mono text-xs" id="console-output">
                        <template x-for="log in logs">
                            <div class="group flex items-start gap-2 hover:bg-white/5 p-1 rounded cursor-pointer" @click="copyToClipboard(log)">
                                <span class="text-zinc-600 select-none">#</span>
                                <span class="text-zinc-300 break-all" x-text="log"></span>
                                <i data-lucide="copy" class="w-3 h-3 text-zinc-600 opacity-0 group-hover:opacity-100 transition ml-auto"></i>
                            </div>
                        </template>
                    </div>
                    <div class="p-3 glass border-t border-white/5 flex gap-2">
                        <span class="text-brand-400 font-mono font-bold">&gt;</span>
                        <input type="text" x-model="cmd" @keydown.enter="sendCmd()" class="flex-1 bg-transparent border-none focus:outline-none font-mono text-sm text-white" placeholder="Type command...">
                        <button @click="sendCmd()" class="px-4 py-1 bg-brand-600 hover:bg-brand-500 rounded text-xs font-bold text-white">SEND</button>
                    </div>
                    <div class="absolute top-4 right-4 flex gap-2">
                        <button @click="mcControl('start')" class="px-3 py-1.5 bg-green-600/20 text-green-400 border border-green-600/50 rounded text-xs hover:bg-green-600/30">Start</button>
                        <button @click="mcControl('stop')" class="px-3 py-1.5 bg-red-600/20 text-red-400 border border-red-600/50 rounded text-xs hover:bg-red-600/30">Stop</button>
                        <button @click="mcControl('restart')" class="px-3 py-1.5 bg-blue-600/20 text-blue-400 border border-blue-600/50 rounded text-xs hover:bg-blue-600/30">Restart</button>
                    </div>
                </div>

                <!-- Files Tab -->
                <div x-show="tab === 'files'" class="absolute inset-0 flex flex-col p-4" x-cloak>
                    <div class="flex items-center gap-2 mb-4 overflow-x-auto">
                        <button @click="cd('')" class="text-zinc-400 hover:text-white text-sm">Root</button>
                        <template x-for="(part, i) in path.split('/').filter(Boolean)">
                            <div class="flex items-center gap-2 text-sm">
                                <i data-lucide="chevron-right" class="w-3 h-3 text-zinc-600"></i>
                                <button @click="cd(path.split('/').slice(0, i+1).join('/'))" class="text-brand-400 hover:underline" x-text="part"></button>
                            </div>
                        </template>
                    </div>
                    <div class="flex-1 glass rounded-xl overflow-hidden flex flex-col">
                        <div class="flex items-center justify-between p-3 border-b border-white/5 bg-dark-800">
                            <div class="flex gap-2">
                                <button @click="createFolder()" class="p-2 hover:bg-white/5 rounded text-zinc-400"><i data-lucide="folder-plus" class="w-4 h-4"></i></button>
                                <button @click="createFile()" class="p-2 hover:bg-white/5 rounded text-zinc-400"><i data-lucide="file-plus" class="w-4 h-4"></i></button>
                                <label class="p-2 hover:bg-white/5 rounded text-zinc-400 cursor-pointer"><i data-lucide="upload" class="w-4 h-4"></i><input type="file" class="hidden" @change="uploadFile($event)"></label>
                            </div>
                            <div class="text-xs text-zinc-500" x-text="storageText"></div>
                        </div>
                        <div class="flex-1 overflow-y-auto scrollbar">
                            <template x-for="file in files">
                                <div class="flex items-center justify-between p-3 border-b border-white/5 hover:bg-white/5 group transition">
                                    <div class="flex items-center gap-3 overflow-hidden">
                                        <i :data-lucide="file.is_dir ? 'folder' : 'file'" class="w-5 h-5 text-brand-400 shrink-0"></i>
                                        <div class="flex flex-col overflow-hidden">
                                            <span class="text-sm text-zinc-200 truncate" x-text="file.name"></span>
                                            <span class="text-xs text-zinc-500" x-text="file.is_dir ? 'Folder' : formatSize(file.size)"></span>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition">
                                        <button @click="editFile(file)" class="p-1.5 hover:bg-white/10 rounded text-zinc-400"><i data-lucide="edit-3" class="w-3 h-3"></i></button>
                                        <button @click="downloadFile(file)" class="p-1.5 hover:bg-white/10 rounded text-zinc-400"><i data-lucide="download" class="w-3 h-3"></i></button>
                                        <button @click="deleteFile(file)" class="p-1.5 hover:bg-red-500/20 rounded text-red-400"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- Plugins Tab -->
                <div x-show="tab === 'plugins'" class="absolute inset-0 p-4 overflow-y-auto scrollbar" x-cloak>
                    <div class="flex gap-2 mb-6">
                        <input type="text" x-model="pluginSearch" @keydown.enter="searchPlugins()" placeholder="Search Modrinth..." class="flex-1 bg-dark-800 border border-dark-600 rounded-lg px-4 py-2 text-sm focus:border-brand-500 outline-none">
                        <button @click="searchPlugins()" class="bg-brand-600 hover:bg-brand-500 text-white px-6 rounded-lg text-sm font-medium">Search</button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        <template x-for="p in pluginResults">
                            <div class="glass p-4 rounded-xl flex flex-col gap-3 hover:border-brand-500/50 transition">
                                <div class="flex justify-between items-start">
                                    <h3 class="font-bold text-white" x-text="p.title"></h3>
                                    <span class="text-xs bg-white/10 px-2 py-1 rounded" x-text="p.downloads + ' ↓'"></span>
                                </div>
                                <p class="text-xs text-zinc-400 line-clamp-3 flex-1" x-text="p.description"></p>
                                <button @click="installPlugin(p)" class="w-full py-2 bg-white/5 hover:bg-brand-600 hover:text-white rounded-lg text-xs font-medium transition flex items-center justify-center gap-2">
                                    <i data-lucide="download-cloud" class="w-3 h-3"></i> Install
                                </button>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Analytics Tab -->
                <div x-show="tab === 'analytics'" class="absolute inset-0 p-4 overflow-y-auto scrollbar" x-cloak>
                    <h2 class="text-xl font-bold mb-4">Player Analytics</h2>
                    <div class="glass rounded-xl overflow-hidden">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-dark-800 text-zinc-400">
                                <tr>
                                    <th class="p-3">Player</th>
                                    <th class="p-3">IPs</th>
                                    <th class="p-3">Joins</th>
                                    <th class="p-3">Deaths</th>
                                    <th class="p-3">Action</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-white/5">
                                <template x-for="(data, name) in analytics" :key="name">
                                    <tr class="hover:bg-white/5">
                                        <td class="p-3 flex items-center gap-2">
                                            <img :src="'https://mc-heads.net/avatar/' + name" class="w-6 h-6 rounded">
                                            <span x-text="name"></span>
                                        </td>
                                        <td class="p-3 text-zinc-400 font-mono text-xs" x-text="data.ips?.length ? data.ips.join(', ') : 'Unknown'"></td>
                                        <td class="p-3 text-zinc-300" x-text="data.joins?.length || 0"></td>
                                        <td class="p-3 text-red-400" x-text="data.deaths || 0"></td>
                                        <td class="p-3">
                                            <button @click="sendCmd('ban ' + name)" class="text-red-400 hover:text-red-300 text-xs">Ban</button>
                                        </td>
                                    </tr>
                                </template>
                                <tr x-show="Object.keys(analytics).length === 0">
                                    <td colspan="5" class="p-8 text-center text-zinc-500">No player data recorded yet.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Settings Tab -->
                <div x-show="tab === 'settings'" class="absolute inset-0 p-4 flex items-center justify-center" x-cloak>
                    <div class="glass p-8 rounded-2xl w-full max-w-lg space-y-6">
                        <h2 class="text-xl font-bold">Panel Settings</h2>
                        <div>
                            <label class="block text-xs text-zinc-400 mb-1">Server IP (Display)</label>
                            <input type="text" x-model="settings.server_ip" class="w-full bg-dark-900 border border-dark-600 rounded px-3 py-2 text-sm">
                        </div>
                        <div class="flex items-center justify-between">
                            <label class="text-sm text-zinc-300">Auto Backup on Empty</label>
                            <input type="checkbox" x-model="settings.auto_backup" class="accent-brand-500">
                        </div>
                        <div>
                            <label class="block text-xs text-zinc-400 mb-1">Change Password</label>
                            <input type="password" x-model="newPassword" placeholder="New Password" class="w-full bg-dark-900 border border-dark-600 rounded px-3 py-2 text-sm mb-2">
                            <input type="password" x-model="currentPassword" placeholder="Current Password" class="w-full bg-dark-900 border border-dark-600 rounded px-3 py-2 text-sm">
                        </div>
                        <button @click="saveSettings()" class="w-full bg-brand-600 hover:bg-brand-500 text-white py-2 rounded-lg font-medium">Save Changes</button>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- Editor Modal -->
    <div x-show="editorOpen" class="fixed inset-0 z-50 bg-black/90 backdrop-blur-sm flex items-center justify-center p-4" x-cloak>
        <div class="bg-dark-800 w-full max-w-5xl h-[80vh] rounded-xl flex flex-col border border-white/10 shadow-2xl">
            <div class="flex items-center justify-between p-4 border-b border-white/5">
                <span class="font-mono text-sm" x-text="editorFile"></span>
                <div class="flex gap-2">
                    <button @click="saveEditor()" class="px-4 py-1.5 bg-brand-600 hover:bg-brand-500 rounded text-xs font-bold">Save</button>
                    <button @click="editorOpen = false" class="px-4 py-1.5 bg-white/10 hover:bg-white/20 rounded text-xs">Close</button>
                </div>
            </div>
            <div id="ace-editor" class="flex-1"></div>
        </div>
    </div>

    <script>
        function app() {
            return {
                auth: false,
                password: '',
                error: '',
                tab: 'console',
                wsOpen: false,
                logs: [],
                cmd: '',
                status: { players: 0, version: '...', ip: '...' },
                files: [],
                path: '',
                storageText: '',
                pluginSearch: '',
                pluginResults: [],
                analytics: {},
                settings: { server_ip: '', auto_backup: true },
                newPassword: '',
                currentPassword: '',
                editorOpen: false,
                editorFile: '',
                editor: null,
                navItems: [
                    { id: 'console', label: 'Console', icon: 'terminal' },
                    { id: 'files', label: 'Files', icon: 'folder' },
                    { id: 'plugins', label: 'Plugins', icon: 'puzzle' },
                    { id: 'analytics', label: 'Analytics', icon: 'users' }
                ],
                initApp() {
                    const saved = localStorage.getItem('mc_pass');
                    if (saved) { this.password = saved; this.login(); }
                    lucide.createIcons();
                },
                async login() {
                    try {
                        const res = await fetch('/api/auth', { method: 'POST', body: new URLSearchParams({ pass: this.password }) });
                        if (res.ok) {
                            this.auth = true;
                            localStorage.setItem('mc_pass', this.password);
                            this.connectWS();
                            this.loadSettings();
                            this.refreshFiles();
                            setTimeout(() => lucide.createIcons(), 100);
                        } else { this.error = 'Invalid Password'; }
                    } catch (e) { this.error = 'Connection Failed'; }
                },
                logout() {
                    this.auth = false;
                    localStorage.removeItem('mc_pass');
                    if (this.ws) this.ws.close();
                },
                connectWS() {
                    this.ws = new WebSocket(`ws://${location.host}/ws?pass=${encodeURIComponent(this.password)}`);
                    this.ws.onopen = () => { this.wsOpen = true; };
                    this.ws.onclose = () => { this.wsOpen = false; setTimeout(() => this.connectWS(), 3000); };
                    this.ws.onmessage = (e) => {
                        const msg = JSON.parse(e.data);
                        if (msg.type === 'log') {
                            this.logs.push(msg.data);
                            if (this.logs.length > 500) this.logs.shift();
                            this.$nextTick(() => {
                                const el = document.getElementById('console-output');
                                if(el) el.scrollTop = el.scrollHeight;
                            });
                        } else if (msg.type === 'status') {
                            this.status = msg.data;
                        }
                    };
                },
                sendCmd() {
                    if (!this.cmd.trim()) return;
                    if (this.ws && this.ws.readyState === 1) {
                        this.ws.send(JSON.stringify({ type: 'command', data: this.cmd }));
                        this.cmd = '';
                    }
                },
                async mcControl(action) {
                    await fetch('/api/mc/control', { method: 'POST', body: new URLSearchParams({ action }) });
                },
                async refreshFiles() {
                    const res = await fetch(`/api/fs/list?path=${encodeURIComponent(this.path)}`);
                    this.files = await res.json();
                    const disk = await fetch('/api/fs/disk').then(r => r.json());
                    this.storageText = `${(disk.used/1024/1024/1024).toFixed(1)}GB / ${(disk.total/1024/1024/1024).toFixed(1)}GB`;
                    setTimeout(() => lucide.createIcons(), 50);
                },
                cd(p) { this.path = p; this.refreshFiles(); },
                formatSize(b) { if (!b) return ''; const i = Math.floor(Math.log(b) / Math.log(1024)); return `${(b / Math.pow(1024, i)).toFixed(1)} ${['B', 'KB', 'MB', 'GB'][i]}`; },
                async deleteFile(f) {
                    if(!confirm(`Delete ${f.name}?`)) return;
                    await fetch('/api/fs/delete', { method: 'POST', body: new URLSearchParams({ path: this.path ? this.path+'/'+f.name : f.name }) });
                    this.refreshFiles();
                },
                async downloadFile(f) { window.open(`/api/fs/download?path=${encodeURIComponent(this.path ? this.path+'/'+f.name : f.name)}`); },
                async createFolder() {
                    const name = prompt('Folder Name:');
                    if (name) { await fetch('/api/fs/new-folder', { method: 'POST', body: new URLSearchParams({ path: this.path, name }) }); this.refreshFiles(); }
                },
                async createFile() {
                    const name = prompt('File Name:');
                    if (name) { await fetch('/api/fs/new-file', { method: 'POST', body: new URLSearchParams({ path: this.path, name }) }); this.refreshFiles(); }
                },
                async uploadFile(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const fd = new FormData(); fd.append('file', file); fd.append('path', this.path);
                    await fetch('/api/fs/upload', { method: 'POST', body: fd });
                    this.refreshFiles();
                },
                editFile(f) {
                    this.editorFile = f.name;
                    this.editorOpen = true;
                    this.$nextTick(() => {
                        if (!this.editor) {
                            this.editor = ace.edit("ace-editor");
                            this.editor.setTheme("ace/theme/twilight");
                            this.editor.session.setMode("ace/mode/text");
                        }
                        fetch(`/api/fs/read?path=${encodeURIComponent(this.path ? this.path+'/'+f.name : f.name)}`)
                            .then(r => r.text())
                            .then(t => this.editor.setValue(t, -1));
                    });
                },
                async saveEditor() {
                    await fetch('/api/fs/write', { method: 'POST', body: new URLSearchParams({ path: this.path ? this.path+'/'+this.editorFile : this.editorFile, content: this.editor.getValue() }) });
                    this.editorOpen = false;
                },
                async searchPlugins() {
                    if (!this.pluginSearch) return;
                    const res = await fetch(`https://api.modrinth.com/v2/search?query=${encodeURIComponent(this.pluginSearch)}&facets=[["project_type:plugin"]]&limit=12`);
                    const data = await res.json();
                    this.pluginResults = data.hits;
                    setTimeout(() => lucide.createIcons(), 50);
                },
                async installPlugin(p) {
                    const res = await fetch(`https://api.modrinth.com/v2/project/${p.id}/version?loaders=["paper","purpur","spigot"]&game_versions=["1.21.1"]`);
                    const versions = await res.json();
                    if (versions.length) {
                        const file = versions[0].files[0];
                        await fetch('/api/plugins/install', { method: 'POST', body: new URLSearchParams({ url: file.url, filename: file.filename }) });
                        alert('Installed ' + p.title);
                    } else { alert('No compatible version found'); }
                },
                async loadSettings() {
                    const res = await fetch('/api/settings');
                    const data = await res.json();
                    this.settings = data;
                    this.analytics = data.analytics || {};
                    this.status.ip = data.server_ip;
                },
                async saveSettings() {
                    await fetch('/api/settings', { method: 'POST', body: new URLSearchParams({ 
                        password: this.currentPassword, 
                        new_pass: this.newPassword, 
                        server_ip: this.settings.server_ip, 
                        auto_backup: this.settings.auto_backup 
                    })});
                    alert('Settings Saved');
                    this.newPassword = ''; this.currentPassword = '';
                },
                copyToClipboard(text) { navigator.clipboard.writeText(text); }
            }
        }
    </script>
</body>
</html>
