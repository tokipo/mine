<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC_SYS // TERMINAL</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000; --bg-panel: #0a0a0a; --bg-hover: #161616;
    --fg: #e0e0e0; --fg-dim: #666666; 
    --border: #333333; --border-focus: #00ff00;
    --acc: #00ff00; --acc-dim: rgba(0,255,0,0.1);
    --err: #ff003c; --err-dim: rgba(255,0,60,0.1);
    --font: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--fg); font-family: var(--font); font-size: 12px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; text-transform: uppercase; }
  
  /* Utils */
  button, input, select, textarea { font-family: inherit; font-size: inherit; text-transform: inherit; background: none; color: inherit; border: 1px solid var(--border); outline: none; transition: border 0.1s; }
  button { cursor: pointer; padding: 6px 12px; background: var(--bg-panel); }
  button:hover { background: var(--acc-dim); border-color: var(--acc); color: var(--acc); }
  button.danger:hover { background: var(--err-dim); border-color: var(--err); color: var(--err); }
  input, select { padding: 6px 10px; background: var(--bg); width: 100%; }
  input:focus, textarea:focus { border-color: var(--acc); }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); border-left: 1px solid var(--border); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  ::-webkit-scrollbar-thumb:hover { background: var(--fg-dim); }

  /* Layout */
  #login { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .login-box { border: 1px solid var(--border); padding: 24px; width: 300px; background: var(--bg-panel); }
  
  header { border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; background: var(--bg-panel); flex-shrink: 0; }
  .status-bar { display: flex; gap: 20px; color: var(--fg-dim); }
  .status-item span { color: var(--acc); font-weight: 700; }
  
  .layout { display: flex; flex: 1; overflow: hidden; }
  nav { width: 180px; border-right: 1px solid var(--border); background: var(--bg-panel); display: flex; flex-direction: column; }
  .nav-btn { border: none; border-bottom: 1px solid var(--border); text-align: left; padding: 12px 16px; background: transparent; }
  .nav-btn.active { color: var(--acc); border-left: 4px solid var(--acc); padding-left: 12px; background: var(--acc-dim); }
  
  main { flex: 1; position: relative; display: flex; flex-direction: column; }
  .tab { display: none; flex: 1; flex-direction: column; overflow: hidden; padding: 16px; }
  .tab.active { display: flex; }

  /* Console */
  #term { flex: 1; overflow-y: auto; padding: 10px; border: 1px solid var(--border); background: var(--bg); word-wrap: break-word; white-space: pre-wrap; margin-bottom: 10px; }
  .term-line:hover { background: var(--bg-hover); }
  .cmd-bar { display: flex; gap: 10px; }
  
  /* Tables/Grids */
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th, .data-table td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
  .data-table th { background: var(--bg-panel); color: var(--fg-dim); }
  .data-table tr:hover { background: var(--bg-hover); }
  
  /* Player Analytics */
  .player-card { border: 1px solid var(--border); display: flex; gap: 16px; padding: 12px; background: var(--bg-panel); align-items: center; margin-bottom: 10px; }
  .player-head { width: 48px; height: 48px; border: 1px solid var(--border); image-rendering: pixelated; }
  .player-info { flex: 1; }
  .player-name { font-size: 14px; color: var(--acc); font-weight: 700; margin-bottom: 4px; }
  .player-meta { color: var(--fg-dim); font-size: 10px; }
  .alts-warn { color: var(--err); font-weight: 700; margin-top: 4px; display: none; }
  
  /* File Manager */
  .toolbar { display: flex; gap: 10px; margin-bottom: 10px; }
  .file-list { flex: 1; overflow-y: auto; border: 1px solid var(--border); }
  .file-row { display: flex; padding: 8px 12px; border-bottom: 1px solid var(--border); cursor: pointer; align-items: center; justify-content: space-between; }
  .file-row:hover { background: var(--bg-hover); }
  .file-row-actions { opacity: 0; display: flex; gap: 6px; }
  .file-row:hover .file-row-actions { opacity: 1; }
  
  /* Editor */
  #editor-container { display: none; position: absolute; inset: 0; background: var(--bg); flex-direction: column; z-index: 10; border-left: 1px solid var(--border); }
  #editor { flex: 1; background: var(--bg); border: none; padding: 16px; color: var(--fg); resize: none; tab-size: 4; }
  
  /* Toasts */
  #toasts { position: fixed; bottom: 16px; right: 16px; display: flex; flex-direction: column; gap: 8px; z-index: 999; }
  .toast { padding: 10px 16px; border: 1px solid var(--acc); background: var(--bg-panel); color: var(--acc); }
</style>
</head>
<body>

<div id="login">
  <div class="login-box">
    <h2 style="margin-bottom: 16px; color: var(--acc);">AUTH_REQ</h2>
    <input type="password" id="pass" placeholder="PASSWORD" style="margin-bottom: 10px;" autofocus>
    <button onclick="auth()" style="width: 100%;">INITIALIZE</button>
  </div>
</div>

<header>
  <div>MC_SYS // DASHBOARD</div>
  <div class="status-bar">
    <div class="status-item">IP: <span id="hdr-ip">0.0.0.0</span></div>
    <div class="status-item">PLAYERS: <span id="hdr-players">0</span></div>
    <div class="status-item">STATUS: <span id="hdr-status" style="color:var(--err)">OFFLINE</span></div>
  </div>
</header>

<div class="layout">
  <nav>
    <button class="nav-btn active" onclick="nav('console')">CONSOLE</button>
    <button class="nav-btn" onclick="nav('players')">ANALYTICS</button>
    <button class="nav-btn" onclick="nav('files')">FILES</button>
    <button class="nav-btn" onclick="nav('plugins')">PLUGINS</button>
  </nav>

  <main>
    <!-- Console -->
    <div id="tab-console" class="tab active">
      <div class="toolbar">
        <button onclick="mc('start')">START</button>
        <button onclick="mc('stop')">STOP</button>
        <button onclick="mc('kill')" class="danger">KILL</button>
        <button onclick="ws.send('list')">SYNC PLAYERS</button>
      </div>
      <div id="term"></div>
      <div class="cmd-bar">
        <span style="color:var(--acc); padding-top:6px;">></span>
        <input type="text" id="cmd" placeholder="EXECUTE COMMAND..." autocomplete="off">
      </div>
    </div>

    <!-- Analytics -->
    <div id="tab-players" class="tab">
      <div class="toolbar" style="justify-content: space-between;">
        <div>PLAYER DATABASE // LOCAL CACHE</div>
        <button onclick="saveConfig()">FORCE SAVE</button>
      </div>
      <div id="player-list" style="overflow-y: auto; flex: 1;"></div>
    </div>

    <!-- Files -->
    <div id="tab-files" class="tab">
      <div class="toolbar">
        <button onclick="loadFiles('..')">UP_DIR</button>
        <button onclick="newFile(true)">MKDIR</button>
        <button onclick="newFile(false)">TOUCH</button>
        <span id="current-path" style="align-self:center; margin-left:10px; color:var(--acc);">/</span>
      </div>
      <div class="file-list" id="file-list"></div>
      
      <div id="editor-container">
        <div class="toolbar" style="padding: 10px; border-bottom: 1px solid var(--border); margin: 0; background: var(--bg-panel);">
          <span id="editor-file" style="align-self: center; color: var(--acc); flex: 1;"></span>
          <button onclick="saveEditor()">WRITE</button>
          <button onclick="closeEditor()">CLOSE</button>
        </div>
        <textarea id="editor" spellcheck="false"></textarea>
      </div>
    </div>

    <!-- Plugins -->
    <div id="tab-plugins" class="tab">
      <div class="toolbar">
        <input type="text" id="pl-search" placeholder="MODRINTH QUERY..." style="width: 300px;">
        <select id="pl-ver" style="width: 120px;">
          <option>1.21.1</option><option>1.20.4</option><option>1.19.4</option>
        </select>
        <button onclick="searchPlugins()">QUERY</button>
      </div>
      <div id="pl-list" style="overflow-y: auto; flex: 1;"></div>
    </div>
  </main>
</div>

<div id="toasts"></div>

<script>
/* --- Core State & Optimistic Caching --- */
const API = '';
let pass = localStorage.getItem('mc_pass') || '';
let ws = null;

// The central Store for state management
const Store = {
  players: {}, // UUID -> { name, ips:[], firstJoin, lastSeen, playtime }
  settings: { ip: "127.0.0.1" },
  online: new Set()
};

let saveTimeout = null;
let backupTimer = null;
let currentPath = '';
let editingPath = '';

/* --- Init & Auth --- */
if(pass) auth();
async function auth() {
  const p = pass || document.getElementById('pass').value;
  try {
    const r = await fetch(API+'/api/auth', { method: 'POST', body: new URLSearchParams({pass: p}) });
    if(r.ok) {
      pass = p; localStorage.setItem('mc_pass', pass);
      document.getElementById('login').style.display = 'none';
      init();
    } else throw new Error();
  } catch { alert('AUTH FAILED'); }
}

async function init() {
  connectWS();
  await loadConfig();
  document.getElementById('hdr-ip').innerText = Store.settings.ip || '0.0.0.0';
  loadFiles('');
  renderPlayers();
}

/* --- State Management (Config.json) --- */
async function loadConfig() {
  try {
    const r = await fetch(API+'/api/fs/read?path=plugins/config.json');
    if(r.ok) {
      const data = JSON.parse(await r.text());
      Store.players = data.players || {};
      Store.settings = data.settings || {};
    }
  } catch(e) { console.error("Config load failed", e); }
}

function queueSave() {
  if(saveTimeout) clearTimeout(saveTimeout);
  saveTimeout = setTimeout(saveConfig, 2000);
}

async function saveConfig() {
  const payload = JSON.stringify({ players: Store.players, settings: Store.settings });
  await fetch(API+'/api/fs/write', { method:'POST', body: new URLSearchParams({ path: 'plugins/config.json', content: payload }) });
  toast('CONFIG_SYNCED');
}

/* --- WebSocket & Log Parsing Engine --- */
function connectWS() {
  ws = new WebSocket(`${location.protocol==='https:'?'wss:':'ws:'}//${location.host}/ws?pass=${encodeURIComponent(pass)}`);
  ws.onopen = () => { document.getElementById('hdr-status').innerText = 'ONLINE'; document.getElementById('hdr-status').style.color = 'var(--acc)'; ws.send('list'); };
  ws.onclose = () => { document.getElementById('hdr-status').innerText = 'OFFLINE'; document.getElementById('hdr-status').style.color = 'var(--err)'; setTimeout(connectWS, 3000); };
  ws.onmessage = e => parseLog(e.data);
}

function parseLog(line) {
  const term = document.getElementById('term');
  const div = document.createElement('div');
  div.className = 'term-line'; div.innerText = line;
  term.appendChild(div);
  if(term.childNodes.length > 500) term.removeChild(term.firstChild);
  term.scrollTop = term.scrollHeight;

  // Regex rules for Player Analytics
  // 1. UUID Mapping
  let m = line.match(/logged in as (\w+) \(UUID: ([\w-]+)\)/);
  if(m) updatePlayer(m[2], { name: m[1] });

  // 2. IP Mapping
  m = line.match(/(\w+)\[\/([0-9\.]+):\d+\] logged in/);
  if(m) {
    const name = m[1], ip = m[2];
    const uuid = Object.keys(Store.players).find(k => Store.players[k].name === name);
    if(uuid) {
      if(!Store.players[uuid].ips) Store.players[uuid].ips = [];
      if(!Store.players[uuid].ips.includes(ip)) Store.players[uuid].ips.push(ip);
      queueSave();
    }
  }

  // 3. Join/Leave & Autonomous Maintenance
  if(line.includes("joined the game")) {
    m = line.match(/(\w+) joined the game/);
    if(m) handleJoin(m[1]);
  }
  if(line.includes("left the game") || line.includes("disconnected")) {
    m = line.match(/(\w+) (left the game|lost connection)/);
    if(m) handleLeave(m[1]);
  }
  
  // 4. Player List Sync (Response to 'list')
  m = line.match(/There are (\d+) of a max of \d+ players online:/);
  if(m) {
    const count = parseInt(m[1]);
    document.getElementById('hdr-players').innerText = count;
    // We don't perfectly sync the Set here to avoid wiping it out if names aren't listed, 
    // but we know count.
  }
}

function updatePlayer(uuid, data) {
  if(!Store.players[uuid]) {
    Store.players[uuid] = { name: data.name, ips:[], firstJoin: Date.now(), playtime: 0, lastSeen: Date.now() };
  } else {
    Store.players[uuid].name = data.name;
    Store.players[uuid].lastSeen = Date.now();
  }
  queueSave();
  if(document.getElementById('tab-players').classList.contains('active')) renderPlayers();
}

function handleJoin(name) {
  Store.online.add(name);
  updateOnlineCount();
  const uuid = Object.keys(Store.players).find(k => Store.players[k].name === name);
  if(uuid) { Store.players[uuid].lastSeen = Date.now(); queueSave(); }
}

function handleLeave(name) {
  Store.online.delete(name);
  updateOnlineCount();
  const uuid = Object.keys(Store.players).find(k => Store.players[k].name === name);
  if(uuid) {
    // Add rough session time (assume 5 mins if we missed join)
    Store.players[uuid].playtime += (Date.now() - Store.players[uuid].lastSeen);
    Store.players[uuid].lastSeen = Date.now();
    queueSave();
  }
}

/* --- Autonomous Maintenance --- */
function updateOnlineCount() {
  const count = Store.online.size;
  document.getElementById('hdr-players').innerText = count;
  
  if(count === 0) {
    // Zero-Player Listener
    toast('ZERO PLAYERS DETECTED. BACKUP IN 2 MINS.');
    backupTimer = setTimeout(() => {
      ws.send("drivebackup backup");
      toast('AUTONOMOUS BACKUP TRIGGERED');
    }, 120000);
  } else {
    if(backupTimer) {
      clearTimeout(backupTimer);
      backupTimer = null;
      toast('BACKUP ABORTED (PLAYER JOINED)');
    }
  }
}

document.getElementById('cmd').onkeydown = e => {
  if(e.key === 'Enter' && e.target.value) {
    ws.send(e.target.value);
    e.target.value = '';
  }
};

/* --- UI Navigation --- */
function nav(id) {
  document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(e => e.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  event.target.classList.add('active');
  if(id === 'players') renderPlayers();
}

function toast(msg) {
  const d = document.createElement('div'); d.className = 'toast'; d.innerText = msg;
  document.getElementById('toasts').appendChild(d);
  setTimeout(() => d.remove(), 3000);
}

async function mc(act) {
  await fetch(API+'/api/mc/control', { method:'POST', body: new URLSearchParams({action: act}) });
  toast('SIGNAL SENT: ' + act.toUpperCase());
}

/* --- Advanced Player Analytics --- */
function renderPlayers() {
  const list = document.getElementById('player-list');
  list.innerHTML = '';
  
  // IP Alt matching logic
  const ipMap = {};
  Object.values(Store.players).forEach(p => {
    (p.ips ||[]).forEach(ip => {
      if(!ipMap[ip]) ipMap[ip] = [];
      ipMap[ip].push(p.name);
    });
  });

  Object.entries(Store.players).sort((a,b) => b[1].lastSeen - a[1].lastSeen).forEach(([uuid, p]) => {
    // Check alts
    let alts = new Set();
    (p.ips || []).forEach(ip => {
      ipMap[ip].forEach(n => { if(n !== p.name) alts.add(n); });
    });

    const card = document.createElement('div');
    card.className = 'player-card';
    const hours = (p.playtime / 3600000).toFixed(1);
    
    card.innerHTML = `
      <img class="player-head" src="https://crafatar.com/avatars/${uuid}?size=48&overlay" onerror="this.src='data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs='">
      <div class="player-info">
        <div class="player-name">${p.name} ${Store.online.has(p.name) ? '[ONLINE]' : ''}</div>
        <div class="player-meta">UUID: ${uuid} | PLAYTIME: ${hours}H | LAST SEEN: ${new Date(p.lastSeen).toLocaleString()}</div>
        <div class="player-meta">IPS: ${(p.ips||[]).join(', ')}</div>
        ${alts.size > 0 ? `<div class="alts-warn">⚠️ SHARED IP DETECTED: ${Array.from(alts).join(', ')}</div>` : ''}
      </div>
    `;
    list.appendChild(card);
  });
}

/* --- High-Speed File Manager --- */
async function loadFiles(dir) {
  if(dir === '..') currentPath = currentPath.split('/').slice(0,-1).join('/');
  else if(dir !== '') currentPath = currentPath ? currentPath + '/' + dir : dir;
  else currentPath = '';
  
  document.getElementById('current-path').innerText = '/' + currentPath;
  const list = document.getElementById('file-list');
  list.innerHTML = 'LOADING...';
  
  const r = await fetch(API+'/api/fs/list?path=' + encodeURIComponent(currentPath));
  const items = await r.json();
  
  list.innerHTML = '';
  items.forEach(f => {
    const row = document.createElement('div');
    row.className = 'file-row';
    row.innerHTML = `
      <div style="display:flex; gap:10px; align-items:center;">
        <span>${f.is_dir ? '📁' : '📄'}</span>
        <span>${f.name}</span>
      </div>
      <div class="file-row-actions">
        ${!f.is_dir ? `<button onclick="event.stopPropagation(); openEditor('${f.name}')">EDIT</button>` : ''}
        <button onclick="event.stopPropagation(); renameFile('${f.name}')">REN</button>
        <button class="danger" onclick="event.stopPropagation(); deleteFile('${f.name}', this)">DEL</button>
      </div>
    `;
    if(f.is_dir) row.onclick = () => loadFiles(f.name);
    list.appendChild(row);
  });
}

async function deleteFile(name, btn) {
  const row = btn.closest('.file-row');
  row.style.display = 'none'; // Optimistic remove
  const p = currentPath ? currentPath+'/'+name : name;
  await fetch(API+'/api/fs/delete', { method:'POST', body: new URLSearchParams({path: p}) });
  toast('DELETED: ' + name);
}

async function renameFile(oldName) {
  const newName = prompt('NEW NAME:', oldName);
  if(!newName || newName === oldName) return;
  const p = currentPath ? currentPath+'/'+oldName : oldName;
  await fetch(API+'/api/fs/rename', { method:'POST', body: new URLSearchParams({path: p, new_name: newName}) });
  loadFiles('');
}

async function newFile(isDir) {
  const name = prompt(isDir ? 'DIR NAME:' : 'FILE NAME:');
  if(!name) return;
  await fetch(API+'/api/fs/new', { method:'POST', body: new URLSearchParams({path: currentPath, name: name, is_dir: isDir}) });
  loadFiles('');
}

/* --- Editor Buffer --- */
async function openEditor(name) {
  editingPath = currentPath ? currentPath+'/'+name : name;
  document.getElementById('editor-file').innerText = editingPath;
  document.getElementById('editor').value = 'LOADING...';
  document.getElementById('editor-container').style.display = 'flex';
  
  const r = await fetch(API+'/api/fs/read?path=' + encodeURIComponent(editingPath));
  document.getElementById('editor').value = await r.text();
}

async function saveEditor() {
  const content = document.getElementById('editor').value;
  await fetch(API+'/api/fs/write', { method:'POST', body: new URLSearchParams({path: editingPath, content: content}) });
  toast('FILE WRITTEN');
}
function closeEditor() { document.getElementById('editor-container').style.display = 'none'; }

// Tab support in editor
document.getElementById('editor').addEventListener('keydown', function(e) {
  if (e.key == 'Tab') {
    e.preventDefault();
    const start = this.selectionStart, end = this.selectionEnd;
    this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
    this.selectionStart = this.selectionEnd = start + 4;
  }
});

/* --- Plugin Engine (Modrinth) --- */
async function searchPlugins() {
  const q = document.getElementById('pl-search').value;
  const ver = document.getElementById('pl-ver').value;
  if(!q) return;
  
  const list = document.getElementById('pl-list');
  list.innerHTML = 'QUERYING MODRINTH...';
  
  try {
    const res = await fetch(`https://api.modrinth.com/v2/search?query=${encodeURIComponent(q)}&facets=[["project_type:plugin"]]&limit=15`);
    const data = await res.json();
    list.innerHTML = '';
    
    data.hits.forEach(p => {
      const card = document.createElement('div');
      card.className = 'player-card';
      card.innerHTML = `
        <div class="player-info">
          <div class="player-name">${p.title}</div>
          <div class="player-meta">${p.description}</div>
          <div class="player-meta" style="margin-top:4px;">DL: ${p.downloads} | AUTH: ${p.author}</div>
        </div>
        <button onclick="installPlugin('${p.project_id}', '${ver}')">INSTALL</button>
      `;
      list.appendChild(card);
    });
  } catch { list.innerHTML = 'QUERY FAILED'; }
}

async function installPlugin(id, ver) {
  toast('RESOLVING DEPENDENCIES...');
  try {
    // Get version file compatible with paper/purpur and the selected MC version
    const res = await fetch(`https://api.modrinth.com/v2/project/${id}/version?loaders=["paper","purpur"]&game_versions=["${ver}"]`);
    const versions = await res.json();
    if(!versions.length) { toast('NO COMPATIBLE BUILD FOUND'); return; }
    
    const file = versions[0].files[0];
    toast('DOWNLOADING ' + file.filename);
    
    await fetch(API+'/api/plugins/install', { method:'POST', body: new URLSearchParams({url: file.url, filename: file.filename}) });
    toast('INSTALLED: ' + file.filename);
  } catch(e) { toast('INSTALLATION FAILED'); }
}
</script>
</body>
</html>
