<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Nexus Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--f:'Inter',system-ui,sans-serif;--m:'JetBrains Mono',monospace;--r:12px;--r-sm:8px;--dur:.2s;--ease:cubic-bezier(.4,0,.2,1)}
[data-theme=dark]{--bg:#0d0d12;--s1:#16161d;--s2:#1e1e28;--s3:#2a2a38;--s4:#363648;--bd:rgba(255,255,255,.06);--bd2:rgba(255,255,255,.12);--t1:#f0f0f5;--t2:rgba(240,240,245,.6);--t3:rgba(240,240,245,.3);--acc:#22c55e;--acc2:#16a34a;--acc-bg:rgba(34,197,94,.1);--red:#ef4444;--red-bg:rgba(239,68,68,.1);--yel:#eab308;--blu:#3b82f6;--blu-bg:rgba(59,130,246,.1);--pur:#a855f7;--glass:rgba(13,13,18,.85);--glass2:rgba(22,22,29,.95);--sh:0 8px 32px rgba(0,0,0,.4)}
[data-theme=light]{--bg:#f5f5f7;--s1:#fff;--s2:#f0f0f2;--s3:#e8e8ed;--s4:#d1d1d6;--bd:rgba(0,0,0,.06);--bd2:rgba(0,0,0,.12);--t1:#1d1d1f;--t2:rgba(29,29,31,.6);--t3:rgba(29,29,31,.3);--acc:#16a34a;--acc2:#15803d;--acc-bg:rgba(22,163,74,.08);--red:#dc2626;--red-bg:rgba(220,38,38,.08);--yel:#ca8a04;--blu:#2563eb;--blu-bg:rgba(37,99,235,.08);--pur:#9333ea;--glass:rgba(255,255,255,.85);--glass2:rgba(255,255,255,.95);--sh:0 8px 32px rgba(0,0,0,.08)}
html,body{height:100%;height:100dvh;overflow:hidden}
body{font-family:var(--f);background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--s4);border-radius:99px}::-webkit-scrollbar-thumb:hover{background:var(--t3)}
input,select,textarea,button{font-family:inherit}
.bg-canvas{position:fixed;inset:0;z-index:0;opacity:.4}
.bg-overlay{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,var(--acc-bg) 0%,transparent 60%);z-index:0}
.login{position:fixed;inset:0;background:var(--overlay);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);display:flex;align-items:center;justify-content:center;z-index:10000}
.login-card{background:var(--glass2);border:1px solid var(--bd2);border-radius:24px;padding:48px;width:380px;text-align:center;box-shadow:var(--sh);animation:loginIn .5s var(--ease)}
@keyframes loginIn{from{opacity:0;transform:scale(.92) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.login-card .logo{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,var(--acc),var(--blu));margin:0 auto 24px;display:flex;align-items:center;justify-content:center}
.login-card .logo svg{width:36px;height:36px;color:#fff}
.login-card h2{font-size:22px;font-weight:700;margin-bottom:8px}
.login-card p{font-size:14px;color:var(--t2);margin-bottom:28px}
.login-card input{width:100%;padding:14px 18px;border-radius:12px;border:1px solid var(--bd2);background:var(--s1);color:var(--t1);font-size:14px;outline:none;transition:border var(--dur)}
.login-card input:focus{border-color:var(--acc)}
.login-card button{width:100%;padding:14px;border-radius:12px;border:none;background:var(--acc);color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:16px;transition:all var(--dur)}
.login-card button:hover{background:var(--acc2);transform:translateY(-1px)}
.login-err{color:var(--red);font-size:13px;margin-top:12px;min-height:20px}
.app{height:100%;display:flex;flex-direction:column;position:relative;z-index:1}
.toolbar{height:56px;background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;z-index:100}
.traffic{display:flex;gap:8px}
.dot{width:12px;height:12px;border-radius:50%;transition:all .3s}
.dot.r{background:#ff5f57}
.dot.y{background:#febc2e}
.dot.g{background:#28c840}
.tb-center{position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600}
.tb-center .pip{width:8px;height:8px;border-radius:50%;background:var(--red);transition:all .4s}
.tb-center .pip.on{background:var(--acc);box-shadow:0 0 10px var(--acc)}
.tb-right{margin-left:auto;display:flex;gap:8px}
.tb-btn{width:36px;height:36px;border-radius:var(--r-sm);border:1px solid var(--bd);background:var(--s2);color:var(--t2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--dur)}
.tb-btn:hover{color:var(--t1);background:var(--s3);border-color:var(--bd2)}
.tb-btn svg{width:18px;height:18px}
.app-body{flex:1;display:flex;overflow:hidden;min-height:0}
.sidebar{width:72px;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-right:1px solid var(--bd);display:flex;flex-direction:column;padding:12px 8px;gap:4px;flex-shrink:0}
.nav-btn{display:flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:var(--r);border:none;background:none;color:var(--t2);cursor:pointer;transition:all var(--dur);position:relative}
.nav-btn:hover{background:var(--s3);color:var(--t1)}
.nav-btn.active{background:var(--acc-bg);color:var(--acc)}
.nav-btn svg{width:24px;height:24px}
.nav-btn .badge{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--red)}
.nav-divider{flex:1}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:16px;gap:16px}
.tab{display:none;flex:1;flex-direction:column;overflow:hidden;gap:16px}
.tab.active{display:flex}
.status-bar{height:44px;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);display:flex;align-items:center;padding:0 16px;gap:24px;flex-shrink:0}
.status-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t2)}
.status-item svg{width:14px;height:14px;color:var(--acc)}
.status-item strong{color:var(--t1);font-weight:600}
.status-item.players svg{color:var(--blu)}
.status-item.version svg{color:var(--pur)}
.status-divider{width:1px;height:20px;background:var(--bd)}
.status-right{margin-left:auto;display:flex;gap:12px}
.status-btn{font-size:11px;padding:6px 12px;border-radius:6px;border:1px solid var(--bd);background:var(--s2);color:var(--t2);cursor:pointer;transition:all var(--dur);display:flex;align-items:center;gap:6px}
.status-btn:hover{background:var(--s3);color:var(--t1)}
.status-btn svg{width:12px;height:12px}
.win{flex:1;display:flex;flex-direction:column;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.win-bar{height:44px;background:var(--s2);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
.win-title{font-size:13px;font-weight:600;color:var(--t2);flex:1}
.win-actions{display:flex;gap:8px}
.win-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--bd);background:var(--s1);color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;transition:all var(--dur);display:flex;align-items:center;gap:6px}
.win-btn:hover{background:var(--s3);color:var(--t1)}
.win-btn.green{border-color:var(--acc);color:var(--acc)}.win-btn.green:hover{background:var(--acc-bg)}
.win-btn.red{border-color:var(--red);color:var(--red)}.win-btn.red:hover{background:var(--red-bg)}
.win-btn.blue{border-color:var(--blu);color:var(--blu)}.win-btn.blue:hover{background:var(--blu-bg)}
.console-log{flex:1;overflow-y:auto;padding:12px 0;font-family:var(--m);font-size:12px;line-height:1.8;color:var(--t2);background:var(--bg)}
.console-line{padding:2px 16px;cursor:pointer;transition:background var(--dur);display:flex;align-items:flex-start;gap:8px}
.console-line:hover{background:var(--s2)}
.console-line .ts{color:var(--t3);font-size:10px;flex-shrink:0;min-width:60px}
.console-line .msg{flex:1;word-break:break-all}
.console-line .copy-btn{opacity:0;transition:opacity var(--dur);color:var(--t3);padding:2px}
.console-line:hover .copy-btn{opacity:1}
.console-line.warn .msg{color:var(--yel)}
.console-line.error .msg{color:var(--red)}
.console-line.info .msg{color:var(--blu)}
.console-line.success .msg{color:var(--acc)}
.cmd-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--s2);border-top:1px solid var(--bd)}
.cmd-prompt{font-family:var(--m);font-size:14px;color:var(--acc);font-weight:600}
.cmd-input{flex:1;background:transparent;border:none;font-family:var(--m);font-size:13px;color:var(--t1);outline:none}
.cmd-input::placeholder{color:var(--t3)}
.file-toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.breadcrumb{display:flex;align-items:center;gap:4px;flex:1;overflow-x:auto;white-space:nowrap;font-size:12px;padding:8px 0}
.bread-seg{padding:6px 12px;border-radius:8px;border:none;background:none;color:var(--t2);cursor:pointer;font-size:12px;font-weight:500;font-family:var(--f);transition:all var(--dur)}
.bread-seg:hover{background:var(--s3);color:var(--t1)}
.bread-sep{color:var(--t3)}
.storage-info{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--t3)}
.storage-bar{width:100px;height:6px;background:var(--s3);border-radius:99px;overflow:hidden}
.storage-fill{height:100%;background:var(--acc);border-radius:99px;transition:width .4s}
.file-actions{display:flex;gap:8px}
.file-list{flex:1;overflow-y:auto;padding:8px 0}
.file-row{display:flex;align-items:center;gap:16px;padding:12px 20px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background var(--dur)}
.file-row:hover{background:var(--s2)}
.file-row:hover .row-actions{opacity:1;transform:translateX(0)}
.file-icon{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.file-info{flex:1;min-width:0}
.file-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-meta{font-size:12px;color:var(--t3);margin-top:2px}
.row-actions{display:flex;gap:6px;opacity:0;transform:translateX(8px);transition:all var(--dur)}
.action-btn{padding:6px 12px;border-radius:6px;border:none;background:var(--s3);color:var(--t2);font-size:11px;font-weight:500;cursor:pointer;transition:all var(--dur)}
.action-btn:hover{background:var(--s4);color:var(--t1)}
.action-btn.danger:hover{background:var(--red-bg);color:var(--red)}
.pl-toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.pl-select{padding:10px 14px;border-radius:8px;background:var(--s2);color:var(--t1);border:1px solid var(--bd);font-size:13px;outline:none}
.pl-search{flex:1;min-width:200px;padding:10px 16px;border-radius:8px;background:var(--s2);color:var(--t1);border:1px solid var(--bd);font-size:13px;outline:none}
.pl-search:focus{border-color:var(--acc)}
.pl-tabs{display:flex;gap:4px;background:var(--s2);padding:4px;border-radius:10px}
.pl-tab{padding:8px 16px;border-radius:8px;border:none;background:none;color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;transition:all var(--dur)}
.pl-tab.active{background:var(--s1);color:var(--t1);box-shadow:var(--sh)}
.pl-grid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;padding:8px 0;align-content:start}
.pl-card{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:20px;display:flex;flex-direction:column;gap:10px;transition:all var(--dur)}
.pl-card:hover{border-color:var(--bd2);transform:translateY(-2px);box-shadow:var(--sh)}
.pl-card-header{display:flex;align-items:flex-start;gap:12px}
.pl-icon{width:44px;height:44px;border-radius:10px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.pl-card h4{font-size:15px;font-weight:600}
.pl-card p{font-size:12px;color:var(--t2);flex:1;line-height:1.5}
.pl-meta{display:flex;gap:16px;font-size:11px;color:var(--t3)}
.pl-install{padding:10px 20px;border-radius:8px;border:none;background:var(--acc);color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all var(--dur);align-self:flex-start}
.pl-install:hover{background:var(--acc2)}
.settings-grid{display:grid;grid-template-columns:200px 1fr;gap:20px;flex:1;overflow:hidden}
.settings-nav{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:12px;display:flex;flex-direction:column;gap:4px}
.settings-nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:8px;border:none;background:none;color:var(--t2);font-size:13px;font-weight:500;cursor:pointer;transition:all var(--dur);width:100%;text-align:left}
.settings-nav-item:hover{background:var(--s3);color:var(--t1)}
.settings-nav-item.active{background:var(--acc-bg);color:var(--acc)}
.settings-nav-item svg{width:18px;height:18px}
.settings-content{flex:1;overflow-y:auto;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:24px;display:flex;flex-direction:column;gap:24px}
.settings-section h3{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.settings-section h3 svg{width:20px;height:20px;color:var(--acc)}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:16px;background:var(--s2);border-radius:10px}
.settings-row label{font-size:14px;font-weight:500}
.settings-row p{font-size:12px;color:var(--t3);margin-top:2px}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--s4);border:none;cursor:pointer;position:relative;transition:background var(--dur)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform var(--dur)}
.toggle.on{background:var(--acc)}.toggle.on::after{transform:translateX(20px)}
.settings-input{padding:12px 16px;border-radius:8px;border:1px solid var(--bd);background:var(--s1);color:var(--t1);font-size:13px;width:240px}
.settings-input:focus{border-color:var(--acc);outline:none}
.settings-save{padding:12px 24px;border-radius:8px;border:none;background:var(--acc);color:#fff;font-size:14px;font-weight:600;cursor:pointer;align-self:flex-start}
.settings-save:hover{background:var(--acc2)}
.sec-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;flex:1;overflow:hidden}
.sec-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);display:flex;flex-direction:column;overflow:hidden}
.sec-card-header{display:flex;align-items:center;gap:10px;padding:16px;border-bottom:1px solid var(--bd)}
.sec-card-header h3{font-size:14px;font-weight:600;flex:1}
.sec-card-header .count{font-size:12px;color:var(--t3);background:var(--s3);padding:4px 10px;border-radius:99px}
.sec-list{flex:1;overflow-y:auto;padding:8px}
.sec-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:8px;transition:background var(--dur)}
.sec-item:hover{background:var(--s2)}
.sec-avatar{width:36px;height:36px;border-radius:8px;background:var(--s3);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.sec-avatar img{width:100%;height:100%;object-fit:cover}
.sec-info{flex:1;min-width:0}
.sec-info strong{display:block;font-size:13px;font-weight:600}
.sec-info span{font-size:11px;color:var(--t3)}
.sec-badges{display:flex;gap:4px;flex-wrap:wrap}
.sec-badge{font-size:10px;padding:3px 8px;border-radius:4px}
.sec-badge.join{background:var(--acc-bg);color:var(--acc)}
.sec-badge.leave{background:var(--red-bg);color:var(--red)}
.sec-badge.ip{background:var(--blu-bg);color:var(--blu)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);z-index:999;display:none;align-items:center;justify-content:center;padding:24px}
.modal-overlay.show{display:flex}
.modal{background:var(--s1);border:1px solid var(--bd2);border-radius:16px;box-shadow:var(--sh);display:flex;flex-direction:column;animation:modalIn .3s var(--ease);overflow:hidden;max-height:90vh}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-sm{width:420px}
.modal-lg{width:90vw;height:85vh;max-width:1100px}
.modal-bar{height:52px;background:var(--s2);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
.modal-bar .modal-title{flex:1;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.modal-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.modal-body label{font-size:12px;font-weight:600;color:var(--t2);display:block;margin-bottom:6px}
.modal-body input,.modal-body textarea,.modal-body select{padding:12px 16px;border-radius:8px;border:1px solid var(--bd2);background:var(--s2);color:var(--t1);font-size:13px;outline:none;width:100%}
.modal-body input:focus,.modal-body textarea:focus{border-color:var(--acc)}
.modal-body textarea{font-family:var(--m);font-size:13px;line-height:1.6;resize:none;min-height:200px}
.editor-area{flex:1;background:var(--bg);color:var(--t1);font-family:var(--m);font-size:13px;line-height:1.7;padding:16px;border:none;outline:none;resize:none;min-height:400px}
.toast-container{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column-reverse;gap:10px;z-index:9999;pointer-events:none}
.toast{background:var(--glass2);backdrop-filter:blur(20px);border:1px solid var(--bd2);border-radius:12px;padding:14px 20px;display:flex;align-items:center;gap:12px;font-size:13px;font-weight:500;box-shadow:var(--sh);transform:translateX(120%);opacity:0;transition:all .35s var(--ease);pointer-events:auto}
.toast.show{transform:translateX(0);opacity:1}
.toast-icon{width:20px;height:20px;flex-shrink:0}
.toast.ok .toast-icon{color:var(--acc)}
.toast.err .toast-icon{color:var(--red)}
.toast.warn .toast-icon{color:var(--yel)}
.tooltip{position:relative}
.tooltip::after{content:attr(data-tip);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);padding:6px 10px;background:var(--s4);color:var(--t1);font-size:11px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity var(--dur)}
.tooltip:hover::after{opacity:1}
@media(max-width:1024px){.settings-grid{grid-template-columns:1fr}.sec-grid{grid-template-columns:1fr}.pl-grid{grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}}
@media(max-width:768px){.sidebar{width:60px}.nav-btn span{display:none}.toolbar{padding:0 12px}.status-bar{gap:12px;padding:0 12px;overflow-x:auto}.status-item span:not(.val){display:none}.main{padding:12px;gap:12px}.modal-lg{width:95vw}}
</style>
</head>
<body>
<canvas class="bg-canvas" id="bg"></canvas>
<div class="bg-overlay"></div>
<div class="login" id="login">
<div class="login-card">
<div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
<h2>Nexus Panel</h2>
<p>Enter your password to continue</p>
<input type="password" id="login-pass" placeholder="Password" autofocus>
<button id="login-btn">Sign In</button>
<div class="login-err" id="login-err"></div>
</div>
</div>
<div class="app" id="app" style="display:none">
<header class="toolbar">
<div class="traffic"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div></div>
<div class="tb-center"><div class="pip" id="pip"></div><span>Nexus Panel</span></div>
<div class="tb-right">
<button class="tb-btn tooltip" data-tip="Theme" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>
</div>
</header>
<div class="app-body">
<aside class="sidebar">

<div class="toast-container" id="toasts"></div>
<script>
const $=id=>document.getElementById(id),esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};
let pass=localStorage.getItem('nexus-pass')||'',config={theme:'dark',serverIP:'',autoBackup:true,backupOnEmpty:true,notifications:true,consoleTimestamps:false},curPath='',showTs=false,ws,pluginTab='browse',settingsTab='general';
const canvas=$('bg'),ctx=canvas.getContext('2d');let particles=[];
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
function createParticles(){particles=[];for(let i=0;i<60;i++)particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5,size:Math.random()*2+1,opacity:Math.random()*.5+.2})}
function animateBg(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>canvas.width)p.vx*=-1;if(p.y<0||p.y>canvas.height)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fillStyle=`rgba(34,197,94,${p.opacity})`;ctx.fill()});requestAnimationFrame(animateBg)}
window.addEventListener('resize',()=>{resizeCanvas();createParticles()});resizeCanvas();createParticles();animateBg();
async function tryLogin(p){try{const r=await fetch('/api/auth',{method:'POST',body:new URLSearchParams({pass:p})});if(r.ok){pass=p;localStorage.setItem('nexus-pass',p);$('login').style.display='none';$('app').style.display='flex';await initApp()}else{$('login-err').textContent='Incorrect password'}}catch(e){$('login-err').textContent='Connection error'}}
$('login-btn').onclick=()=>tryLogin($('login-pass').value);$('login-pass').onkeydown=e=>{if(e.key==='Enter')tryLogin($('login-pass').value)};if(pass)tryLogin(pass);else{$('login').style.display='flex';$('bg').style.opacity='0';document.querySelector('.bg-overlay').style.opacity='0'}
function toggleTheme(){config.theme=config.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=config.theme;saveConfig()}
async function saveConfig(){try{await fetch('/api/config',{method:'POST',body:JSON.stringify(config),headers:{'Content-Type':'application/json'}})}catch(e){}}
function toast(msg,type='ok'){const d=document.createElement('div');d.className=`toast ${type}`;const icons={ok:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',err:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',warn:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>'};d.innerHTML=`<div class="toast-icon">${icons[type]||icons.ok}</div><span>${msg}</span>`;$('toasts').appendChild(d);requestAnimationFrame(()=>requestAnimationFrame(()=>d.classList.add('show')));setTimeout(()=>{d.classList.remove('show');setTimeout(()=>d.remove(),400)},3500)}
function switchTab(id){document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.nav-btn').forEach(e=>e.classList.remove('active'));$('tab-'+id).classList.add('active');document.querySelector(`[data-tab="${id}"]`).classList.add('active');if(id==='files')refreshFiles();if(id==='security')refreshSecurity();if(id==='settings')renderSettings()}
function setPluginTab(t){pluginTab=t;document.querySelectorAll('.pl-tab').forEach(e=>e.classList.remove('active'));event.target.classList.add('active');if(t==='installed')loadInstalledPlugins()}
function setSettingsTab(t){settingsTab=t;document.querySelectorAll('.settings-nav-item').forEach(e=>e.classList.remove('active'));event.target.classList.add('active');renderSettings()}
function connectWS(){ws=new WebSocket(`${location.protocol==='https:'?'wss:':'ws:'}//${location.host}/ws?pass=${encodeURIComponent(pass)}`);ws.onopen=()=>{$('pip').classList.add('on');updateStatus()};ws.onmessage=e=>{const el=$('logs'),d=document.createElement('div');d.className='console-line';const txt=e.data;let cls='';if(txt.includes('ERROR')||txt.includes('Exception'))cls='error';else if(txt.includes('WARN'))cls='warn';else if(txt.includes('joined')||txt.includes('left'))cls='info';else if(txt.includes('[Panel]'))cls='success';const ts=showTs?`<span class="ts">${new Date().toLocaleTimeString()}</span>`:'';d.innerHTML=`${ts}<span class="msg">${esc(txt)}</span><button class="copy-btn" onclick="copyLine(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>`;d.querySelector('.msg').textContent=txt;el.appendChild(d);if(el.children.length>1000)el.removeChild(el.firstChild);el.scrollTop=el.scrollHeight;updatePlayerCount(txt)};ws.onclose=()=>{$('pip').classList.remove('on');setTimeout(connectWS,3000)};ws.onerror=()=>{}}
function copyLine(btn){const msg=btn.parentElement.querySelector('.msg').textContent;navigator.clipboard.writeText(msg).then(()=>toast('Copied!'))}
$('cmd').onkeydown=e=>{if(e.key==='Enter'&&$('cmd').value.trim()){if(ws&&ws.readyState===1)ws.send($('cmd').value);$('cmd').value=''}};
async function mcCtrl(act){try{const r=await fetch('/api/mc/control',{method:'POST',body:new URLSearchParams({action:act})});toast(await r.text())}catch(e){toast('Request failed','err')}}
async function updateStatus(){try{const r=await fetch('/api/mc/control',{method:'POST',body:new URLSearchParams({action:'status'})});const d=await r.json();$('player-count').textContent=d.players;$('server-version').textContent=d.version;const h=Math.floor(d.uptime/3600);const m=Math.floor((d.uptime%3600)/60);const s=d.uptime%60;$('server-uptime').textContent=`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;$('server-ip').textContent=config.serverIP||'---'}catch(e){}}
function updatePlayerCount(line){if(line.includes('joined the game'))$('player-count').textContent=parseInt($('player-count').textContent)+1;if(line.includes('left the game'))$('player-count').textContent=Math.max(0,parseInt($('player-count').textContent)-1)}
function toggleTimestamps(){showTs=!showTs;toast(showTs?'Timestamps ON':'Timestamps OFF')}
function clearConsole(){$('logs').innerHTML='';toast('Console cleared')}
function searchConsole(){$('search-modal').classList.add('show');setTimeout(()=>$('search-input').focus(),100)}
$('search-input').oninput=()=>{const q=$('search-input').value.toLowerCase();const lines=$('logs').querySelectorAll('.console-line');const results=$('search-results');results.innerHTML='';let count=0;lines.forEach(l=>{const txt=l.querySelector('.msg').textContent;if(q&&txt.toLowerCase().includes(q)){const r=document.createElement('div');r.style.cssText='padding:8px;border-bottom:1px solid var(--bd);font-size:12px;font-family:var(--m)';r.textContent=txt;results.appendChild(r);count++}});if(!q)results.innerHTML='<div style="color:var(--t3);text-align:center;padding:20px">Enter search term...</div>';else if(!count)results.innerHTML='<div style="color:var(--t3);text-align:center;padding:20px">No results found</div>';else results.innerHTML=`<div style="color:var(--t3);padding:8px;font-size:11px">${count} result${count>1?'s':''}</div>`+results.innerHTML}
function fmtBytes(b){if(!+b)return'0 B';const i=Math.floor(Math.log(b)/Math.log(1024));return`${(b/1024**i).toFixed(1)} ${['B','KB','MB','GB','TB'][i]}`}
async function refreshFiles(p){if(p!==undefined)curPath=p;const parts=curPath.split('/').filter(Boolean);let bc=`<button class="bread-seg" onclick="refreshFiles('')">Root</button>`;parts.forEach((x,i)=>{bc+=`<span class="bread-sep">/</span><button class="bread-seg" onclick="refreshFiles('${parts.slice(0,i+1).join('/')}')">${x}</button>`});$('breadcrumb').innerHTML=bc;try{const d=await(await fetch('/api/fs/disk')).json();const pct=((d.used/d.total)*100).toFixed(1);$('storage-fill').style.width=pct+'%';$('storage-text').textContent=`${fmtBytes(d.used)} / ${fmtBytes(d.total)}`}catch(e){}const fl=$('file-list');fl.innerHTML='';try{let items=await(await fetch(`/api/fs/list?path=${encodeURIComponent(curPath)}`)).json();if(curPath)items.unshift({name:'..',is_dir:true,_parent:true});const isTxt=n=>/\.(txt|yml|yaml|json|properties|sh|py|md|csv|log|cfg|conf|toml|xml|html|css|js|java|kt|lua|ini)$/i.test(n);items.forEach(f=>{const fp=(curPath?curPath+'/':'')+f.name;const row=document.createElement('div');row.className='file-row';row.onclick=()=>{if(f.is_dir){if(f._parent)refreshFiles(curPath.split('/').slice(0,-1).join('/'));else refreshFiles(fp)}};const icon=f.is_dir?'📁':f.name.endsWith('.jar')?'🧩':'📄';const size=f.is_dir?'':fmtBytes(f.size);row.innerHTML=`<div class="file-icon">${icon}</div><div class="file-info"><div class="file-name">${esc(f.name)}</div><div class="file-meta">${f._parent?'Parent directory':(f.is_dir?'Folder':size)}</div></div>${!f._parent?`<div class="row-actions">${isTxt(f.name)&&!f.is_dir?`<button class="action-btn" onclick="event.stopPropagation();openEditor('${fp}','${esc(f.name)}')">Edit</button>`:''}<a class="action-btn" href="/api/fs/download?path=${encodeURIComponent(fp)}" onclick="event.stopPropagation()">Download</a><button class="action-btn" onclick="event.stopPropagation();renamePath('${fp}','${esc(f.name)}')">Rename</button><button class="action-btn danger" onclick="event.stopPropagation();deletePath('${fp}')">Delete</button></div>`:''}`;fl.appendChild(row)})}catch(e){fl.innerHTML='<div style="padding:20px;text-align:center;color:var(--t3)">Error loading files</div>'}}
async function deletePath(p){if(!confirm('Delete '+p+'?'))return;try{await fetch('/api/fs/delete',{method:'POST',body:new URLSearchParams({path:p})});toast('Deleted');refreshFiles()}catch(e){toast('Delete failed','err')}}
async function uploadFile(){const files=$('upload-input').files;for(const file of files){const fd=new FormData();fd.append('path',curPath);fd.append('file',file);try{await fetch('/api/fs/upload',{method:'POST',body:fd});toast(`Uploaded ${file.name}`)}catch(e){toast(`Failed: ${file.name}`,'err')}}$('upload-input').value='';refreshFiles()}
function promptModal(title,label,value,cb){$('prompt-title').textContent=title;$('prompt-label').textContent=label;$('prompt-input').value=value||'';$('prompt-ok').onclick=()=>{cb($('prompt-input').value);closeModal('prompt-modal')};$('prompt-input').onkeydown=e=>{if(e.key==='Enter'){cb($('prompt-input').value);closeModal('prompt-modal')}};openModal('prompt-modal');setTimeout(()=>$('prompt-input').focus(),100)}
function renamePath(fp,oldName){promptModal('Rename','New name',oldName,async n=>{if(!n||n===oldName)return;try{await fetch('/api/fs/rename',{method:'POST',body:new URLSearchParams({path:fp,new_name:n})});toast('Renamed');refreshFiles()}catch(e){toast('Rename failed','err')}})}
function showNewFolder(){promptModal('New Folder','Folder name','',async n=>{if(!n)return;try{await fetch('/api/fs/new-folder',{method:'POST',body:new URLSearchParams({path:curPath,name:n})});toast('Folder created');refreshFiles()}catch(e){toast('Failed','err')}})}
function showNewFile(){promptModal('New File','File name','',async n=>{if(!n)return;try{await fetch('/api/fs/new-file',{method:'POST',body:new URLSearchParams({path:curPath,name:n})});toast('File created');refreshFiles()}catch(e){toast('Failed','err')}})}
function openModal(id){$(id).classList.add('show')}
function closeModal(id){$(id).classList.remove('show');if(id==='search-modal')$('search-results').innerHTML=''}
async function openEditor(fp,name){$('editor-title').textContent=name;try{$('editor-text').value=await(await fetch(`/api/fs/read?path=${encodeURIComponent(fp)}`)).text()}catch(e){$('editor-text').value='// Error loading file'}openModal('editor-modal');$('editor-text').dataset.path=fp;$('editor-text').focus()}
async function saveEditor(){const path=$('editor-text').dataset.path;try{await fetch('/api/fs/write',{method:'POST',body:new URLSearchParams({path,content:$('editor-text').value})});toast('Saved');closeModal('editor-modal')}catch(e){toast('Save failed','err')}}
$('pl-q').onkeydown=e=>{if(e.key==='Enter')searchPlugins()};
async function searchPlugins(){const q=$('pl-q').value.trim();if(!q)return;const list=$('pl-list');list.innerHTML='<div style="padding:40px;text-align:center;color:var(--t3)">Searching...</div>';try{const res=await(await fetch(`https://api.modrinth.com/v2/search?query=${encodeURIComponent(q)}&facets=[["project_type:plugin"]]&limit=24`)).json();list.innerHTML='';if(!res.hits.length){list.innerHTML='<div style="padding:40px;text-align:center;color:var(--t3)">No results</div>';return}res.hits.forEach(p=>{const card=document.createElement('div');card.className='pl-card';card.innerHTML=`<div class="pl-card-header"><div class="pl-icon">🧩</div><div><h4>${esc(p.title)}</h4><p>${esc(p.description||'No description')}</p></div></div><div class="pl-meta"><span>↓ ${(p.downloads||0).toLocaleString()}</span><span>★ ${p.follows||0}</span></div><button class="pl-install" onclick="installPlugin('${p.project_id}',${JSON.stringify(p.title).replace(/'/g,"\\'")})">Install</button>`;list.appendChild(card)})}catch(e){list.innerHTML='<div style="padding:40px;text-align:center;color:var(--red)">Search failed</div>'}}
async function installPlugin(id,name){const loader=$('pl-loader').value,ver=$('pl-ver').value;toast(`Fetching ${name}...`);try{const res=await(await fetch(`https://api.modrinth.com/v2/project/${id}/version?loaders=["${loader}"]&game_versions=["${ver}"]`)).json();if(!res.length){toast(`No ${loader} build for ${ver}`,'warn');return}const file=res[0].files[0];const r=await fetch('/api/plugins/install',{method:'POST',body:new URLSearchParams({url:file.url,filename:file.filename,project_id:id,version_id:res[0].id,name:name})});r.ok?toast(`Installed ${name}`):toast('Install failed','err')}catch(e){toast(`Error: ${e.message}`,'err')}}
async function loadInstalledPlugins(){const list=$('pl-list');list.innerHTML='<div style="padding:40px;text-align:center;color:var(--t3)">Loading...</div>';try{const plugins=await(await fetch('/api/plugins/list')).json();if(!plugins.length){list.innerHTML='<div style="padding:40px;text-align:center;color:var(--t3)">No plugins installed</div>';return}list.innerHTML='';plugins.forEach(p=>{const card=document.createElement('div');card.className='pl-card';card.innerHTML=`<div class="pl-card-header"><div class="pl-icon">🧩</div><div><h4>${p.name}</h4><p>${fmtBytes(p.size)}</p></div></div><div class="pl-meta"><span>Modified: ${new Date(p.modified*1000).toLocaleDateString()}</span></div><button class="action-btn danger" onclick="uninstallPlugin('${p.name}')">Uninstall</button>`;list.appendChild(card)})}catch(e){list.innerHTML='<div style="padding:40px;text-align:center;color:var(--red)">Failed to load</div>'}}
async function uninstallPlugin(name){if(!confirm('Uninstall '+name+'?'))return;try{await fetch('/api/plugins/delete',{method:'POST',body:new URLSearchParams({filename:name})});toast('Uninstalled');loadInstalledPlugins()}catch(e){toast('Failed','err')}}
async function refreshSecurity(){try{const h=await(await fetch('/api/history')).json();const sessions=await(await fetch('/api/players/sessions')).json();const ips=await(await fetch('/api/ip/tracker')).json();const pl=$('player-log');pl.innerHTML='';h.playerLogs.slice(-20).reverse().forEach(l=>{const div=document.createElement('div');div.className='sec-item';div.innerHTML=`<div class="sec-avatar"><img src="https://mc-heads.net/avatar/${l.player}/32" onerror="this.parentElement.innerHTML='?'"></div><div class="sec-info"><strong>${esc(l.player)}</strong><span>${l.time} • ${l.ip||'Local'}</span></div><span class="sec-badge ${l.action==='join'?'join':'leave'}">${l.action}</span>`;pl.appendChild(div)});$('player-count-sec').textContent=h.playerLogs.length;const il=$('ip-log');il.innerHTML='';Object.entries(ips).slice(0,15).forEach(([ip,logs])=>{const div=document.createElement('div');div.className='sec-item';div.innerHTML=`<div class="sec-info"><strong>${ip}</strong><span>${logs.length} connections</span></div><span class="sec-badge ip">View</span>`;il.appendChild(div)});$('ip-count').textContent=Object.keys(ips).length;const sl=$('session-list');sl.innerHTML='';Object.entries(sessions).forEach(([player,data])=>{const div=document.createElement('div');div.className='sec-item';const suspicious=data.ips.length>2?' ⚠️':'';div.innerHTML=`<div class="sec-avatar"><img src="https://mc-heads.net/avatar/${player}/32" onerror="this.parentElement.innerHTML='?'"></div><div class="sec-info"><strong>${esc(player)}${suspicious}</strong><span>First seen: ${data.join_time} • ${data.kills} kills • ${data.deaths} deaths</span></div><div class="sec-badges">${data.ips.map(ip=>`<span class="sec-badge ip">${ip}</span>`).join('')}</div>`;sl.appendChild(div)})}catch(e){console.error(e)}}
function renderSettings(){const c=$('settings-content');if(settingsTab==='general'){c.innerHTML=`<div class="settings-section"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>Appearance</h3><div class="settings-row"><div><label>Dark Mode</label><p>Toggle dark/light theme</p></div><button class="toggle ${config.theme==='dark'?'on':''}" onclick="toggleTheme()"></button></div><div class="settings-row"><div><label>Notifications</label><p>Show toast notifications</p></div><button class="toggle ${config.notifications?'on':''}" onclick="config.notifications=!config.notifications;saveConfig();renderSettings()"></button></div></div>`}else if(settingsTab==='server'){c.innerHTML=`<div class="settings-section"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>Server Configuration</h3><div class="settings-row"><div><label>Server IP Address</label><p>Displayed in status bar</p></div><input class="settings-input" value="${config.serverIP||''}" placeholder="e.g., play.example.com:25565" onchange="config.serverIP=this.value;saveConfig()"></div></div>`}else if(settingsTab==='backup'){c.innerHTML=`<div class="settings-section"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Backup Settings</h3><div class="settings-row"><div><label>Auto Backup</label><p>Enable automatic backups</p></div><button class="toggle ${config.autoBackup?'on':''}" onclick="config.autoBackup=!config.autoBackup;saveConfig();renderSettings()"></button></div><div class="settings-row"><div><label>Backup on Empty Server</label><p>Run /drivebackup backup when last player leaves</p></div><button class="toggle ${config.backupOnEmpty?'on':''}" onclick="config.backupOnEmpty=!config.backupOnEmpty;saveConfig();renderSettings()"></button></div><button class="settings-save" onclick="ws&&ws.readyState===1?ws.send('drivebackup backup'):toast('Server not running','err')">Run Backup Now</button></div>`}}
async function initApp(){try{config={...config,...await(await fetch('/api/config')).json()};document.documentElement.dataset.theme=config.theme}catch(e){}connectWS();refreshFiles('');refreshSecurity();renderSettings();setInterval(updateStatus,5000);setInterval(refreshSecurity,15000)}
</script>
</body>
